repos:
  # Standard pre-commit hooks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-added-large-files

  # Detect secrets
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.4.0
    hooks:
      - id: detect-secrets
        exclude: '(package-lock\.json|\.secrets\.baseline)$'

  # Detect IPs (private and public)
  - repo: local
    hooks:
      - id: no-ip-addresses
        name: Check for IP addresses
        entry: '(?<![0-9])(?:(?:25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\.){3}(?:25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)(?![0-9])'
        language: pygrep
        types: [text]
        exclude: '(package-lock\.json|\.secrets\.baseline|\.pre-commit-config\.yaml|src-capacitor/)'

  # Detect URLs with custom domains
  - repo: local
    hooks:
      - id: no-personal-urls
        name: Check for personal URLs
        entry: '(stielau\.us|budditzlab)'
        language: pygrep
        types: [text]
        exclude: '(package-lock\.json|\.secrets\.baseline|\.pre-commit-config\.yaml)$'

  # ESLint
  - repo: local
    hooks:
      - id: eslint
        name: ESLint
        entry: npm run lint --
        language: system
        types: [javascript, vue]
        pass_filenames: false

  # Prettier
  - repo: local
    hooks:
      - id: prettier
        name: Prettier
        entry: npx prettier --check
        language: system
        types_or: [javascript, vue, scss, json, markdown]
